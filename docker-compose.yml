version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: well7_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: well7_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MOCK_S3_PATH=/tmp/mock_s3
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: well7_celery_worker
    command: celery -A celery_app.celery_instance worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MOCK_S3_PATH=/tmp/mock_s3
    depends_on:
      redis:
        condition: service_healthy
